name: Mirror
on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install cvdupdate and clamav
        run: |
          python -m pip install --upgrade pip
          pip install cvdupdate
          sudo apt-get update
          sudo apt-get install -y clamav
      - name: Reconcile DB
        id: reconcile
        run: |
          set -euo pipefail
          mkdir -p out
          cvd config set --dbdir out
          cvd update
          ls -lah out/
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
      - name: Unpack CVD files
        run: |
          set -euo pipefail
          mkdir -p freshclam
          rm -rf freshclam/*
          for cvd in out/*.cvd out/*.cld; do
            [ -f "$cvd" ] || continue
            name=$(basename "$cvd" .cvd)
            name=$(basename "$name" .cld)
            mkdir -p "freshclam/$name"
            (cd "freshclam/$name" && sigtool --unpack="../../$cvd") || true
            sigtool --info="$cvd" > "freshclam/$name/info.txt" || true
          done
          ls -lah freshclam/
          cp out/dns.txt freshclam/
      - name: Commit unpacked freshclam changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SIZE_LIMIT=52428800
          while IFS= read -r file; do
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            if [ "$size" -gt "$SIZE_LIMIT" ]; then
              sha256=$(sha256sum "$file" 2>/dev/null | cut -d' ' -f1 || echo 'unknown')
              rm "$file"
              printf "oid sha256:%s\nsize %s\n" \
                "$sha256" "$size" \
                > "$file.placeholder"
              git add "$file.placeholder"
            else
              git add "$file"
            fi
          done < <(find freshclam/ -type f)
          git diff --cached --quiet && exit 0
          git commit -m "feat: bump [${{ steps.reconcile.outputs.timestamp }}]"
          git push || true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5