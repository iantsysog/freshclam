name: Mirror
on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cvdupdate and clamav
        run: |
          python -m pip install --upgrade pip
          pip install cvdupdate
          sudo apt-get update
          sudo apt-get install -y clamav

      - name: Reconcile DB
        id: reconcile
        run: |
          set -euo pipefail
          mkdir -p out
          cvd config set --dbdir out
          cvd update
          ls -lah out/
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Unpack CVD files
        run: |
          set -euo pipefail
          mkdir -p freshclam
          rm -rf freshclam/*
          for cvd in out/*.cvd out/*.cld 2>/dev/null || true; do
            if [ -f "$cvd" ]; then
              name=$(basename "$cvd" .cvd)
              name=$(basename "$name" .cld)
              mkdir -p "freshclam/$name"
              sigtool --unpack="$cvd" "freshclam/$name" || true
              sigtool --info="$cvd" > "freshclam/$name/info.txt" || true
            fi
          done
          ls -lah freshclam/

      - name: Commit unpacked freshclam changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add freshclam/
          if git diff --cached --quiet; then
            exit 0
          else
            git commit -m "feat: bump [${{ steps.reconcile.outputs.timestamp }}]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4